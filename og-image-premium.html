<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offlyn.ai OG Image</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0f0f0;
    }
    .og-container {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0a0e1a 0%, #0f172a 40%, #1a1f35 100%);
      position: relative;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    /* Subtle background pattern */
    .bg-pattern {
      position: absolute;
      top: 0;
      right: 0;
      width: 50%;
      height: 100%;
      opacity: 0.15;
    }
    
    .grid-line {
      position: absolute;
      background: linear-gradient(90deg, transparent, rgba(39, 227, 141, 0.3), transparent);
      height: 1px;
    }
    
    .grid-line:nth-child(1) { top: 15%; width: 60%; right: 0; }
    .grid-line:nth-child(2) { top: 35%; width: 55%; right: 0; animation: pulse 3s infinite; }
    .grid-line:nth-child(3) { top: 55%; width: 50%; right: 0; }
    .grid-line:nth-child(4) { top: 75%; width: 45%; right: 0; animation: pulse 3s 1s infinite; }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    
    /* Glow orb */
    .glow {
      position: absolute;
      top: -20%;
      right: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(39, 227, 141, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(60px);
    }
    
    /* Content container */
    .content {
      position: relative;
      z-index: 2;
      padding: 80px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    
    /* Logo + wordmark */
    .logo-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-icon {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(39, 227, 141, 0.3));
    }
    
    .logo-text {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #FFFFFF 0%, #E2E8F0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Main content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 750px;
    }
    
    .headline {
      font-size: 72px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #FFFFFF 0%, #CBD5E1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .headline .highlight {
      background: linear-gradient(135deg, #27E38D 0%, #10B981 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subheadline {
      font-size: 32px;
      font-weight: 500;
      color: #94A3B8;
      line-height: 1.4;
      letter-spacing: -0.01em;
    }
    
    /* Bottom badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(39, 227, 141, 0.1);
      border: 1px solid rgba(39, 227, 141, 0.2);
      padding: 12px 20px;
      border-radius: 100px;
      backdrop-filter: blur(10px);
    }
    
    .badge-dot {
      width: 8px;
      height: 8px;
      background: #27E38D;
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(39, 227, 141, 0.6);
      animation: blink 2s infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    
    .badge-text {
      font-size: 16px;
      font-weight: 600;
      color: #27E38D;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    /* Mesh nodes (subtle) */
    .mesh-node {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(39, 227, 141, 0.4);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(39, 227, 141, 0.3);
    }
    
    .mesh-node:nth-child(1) { top: 20%; right: 15%; }
    .mesh-node:nth-child(2) { top: 40%; right: 25%; }
    .mesh-node:nth-child(3) { top: 60%; right: 18%; }
    .mesh-node:nth-child(4) { top: 45%; right: 10%; }
  </style>
</head>
<body>
  <div class="og-container">
    <!-- Background elements -->
    <div class="glow"></div>
    <div class="bg-pattern">
      <div class="grid-line"></div>
      <div class="grid-line"></div>
      <div class="grid-line"></div>
      <div class="grid-line"></div>
      <div class="mesh-node"></div>
      <div class="mesh-node"></div>
      <div class="mesh-node"></div>
      <div class="mesh-node"></div>
    </div>
    
    <!-- Content -->
    <div class="content">
      <!-- Logo + Wordmark -->
      <div class="logo-section">
        <div class="logo-icon">
          <img src="assets/offlyn-logo-3d.png" alt="Offlyn.ai">
        </div>
        <div class="logo-text">Offlyn.ai</div>
      </div>
      
      <!-- Main headline -->
      <div class="main-content">
        <h1 class="headline">
          <span class="highlight">AI Connectivity</span><br>
          with No Network
        </h1>
        <p class="subheadline">
          Offline AI apps. Edge-first. Privacy-first.
        </p>
      </div>
      
      <!-- Bottom badge -->
      <div>
        <div class="badge">
          <div class="badge-dot"></div>
          <span class="badge-text">Zero Internet Required</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
