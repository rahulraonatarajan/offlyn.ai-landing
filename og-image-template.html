<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image Template</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0f0f0;
    }
    .og-image {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      display: flex;
      align-items: center;
      padding: 80px;
      position: relative;
      overflow: hidden;
    }
    .og-image::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(39, 227, 141, 0.1) 0%, transparent 70%);
      border-radius: 50%;
    }
    .content {
      display: flex;
      align-items: center;
      gap: 60px;
      position: relative;
      z-index: 1;
    }
    .logo {
      flex-shrink: 0;
    }
    .logo img {
      width: 280px;
      height: 280px;
      object-fit: contain;
      filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.3));
    }
    .text {
      flex: 1;
    }
    .brand {
      font-size: 72px;
      font-weight: 800;
      color: #FFFFFF;
      margin-bottom: 20px;
      font-family: system-ui, -apple-system, sans-serif;
      letter-spacing: -0.02em;
    }
    .tagline {
      font-size: 36px;
      font-weight: 600;
      color: #27E38D;
      margin-bottom: 30px;
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.2;
    }
    .description {
      font-size: 24px;
      font-weight: 400;
      color: #94A3B8;
      line-height: 1.5;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .accent-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: linear-gradient(90deg, #27E38D 0%, #10B981 100%);
    }
  </style>
</head>
<body>
  <div class="og-image">
    <div class="content">
      <div class="logo">
        <img src="assets/offlyn-logo-3d.png" alt="Offlyn.ai Logo">
      </div>
      <div class="text">
        <div class="brand">Offlyn.ai</div>
        <div class="tagline">AI Connectivity with No Network</div>
        <div class="description">
          Build and run AI apps entirely offline.<br>
          Edge-first, privacy-first, no internet required.
        </div>
      </div>
    </div>
    <div class="accent-bar"></div>
  </div>
</body>
</html>
