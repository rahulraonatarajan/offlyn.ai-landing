<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offlyn.ai OG Image - Refined</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #FFFFFF;
    }
    .og-container {
      width: 1200px;
      height: 630px;
      background: #FFFFFF;
      position: relative;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      border: none;
      box-shadow: none;
    }
    
    /* Content container */
    .content {
      position: relative;
      z-index: 2;
      padding: 70px 100px 120px 100px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    /* Logo + wordmark row */
    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 60px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .brand-name {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #1F2937;
    }
    
    /* Main headline */
    .headline {
      font-size: 68px;
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.04em;
      margin-bottom: 20px;
      max-width: 700px;
    }
    
    .headline-line1 {
      display: block;
      background: linear-gradient(135deg, #27E38D 0%, #1CD179 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .headline-line2 {
      display: block;
      color: #1F2937;
    }
    
    /* Subheadline / description */
    .description {
      font-size: 24px;
      font-weight: 500;
      line-height: 1.4;
      color: #6B7280;
      letter-spacing: -0.01em;
      max-width: 650px;
    }
  </style>
</head>
<body>
  <div class="og-container">
    <!-- Content -->
    <div class="content">
      <!-- Logo + Brand name -->
      <div class="brand-row">
        <div class="logo">
          <img src="assets/offlyn-logo-3d.png" alt="Offlyn.ai">
        </div>
        <div class="brand-name">Offlyn.ai</div>
      </div>
      
      <!-- Main headline -->
      <h1 class="headline">
        <span class="headline-line1">AI Connectivity</span>
        <span class="headline-line2">No Network Required</span>
      </h1>
      
      <!-- Description -->
      <p class="description">
        Offline AI apps.<br>
        Edge-first. Privacy-first.
      </p>
    </div>
  </div>
</body>
</html>
